worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    upstream customer-service { server 127.0.0.1:5001; }
    upstream auth-service { server 127.0.0.1:5002; }
    upstream management-service { server 127.0.0.1:5003; }
    upstream frontend-service { server 127.0.0.1:5173; }

    server {
        listen 8080;
        server_name localhost;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Global CORS configuration
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, X-Requested-With' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        location /api/v1/customer/ {
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://customer-service/;
        }

        location /api/v1/auth/ {
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://auth-service/;
        }

        location /api/v1/management/ {
            if ($request_method = 'OPTIONS') { return 204; }
            proxy_pass http://management-service/;
        }

        location /health {
            return 200 '{"status":"UP","gateway":"Nginx-JAVA-SUDAH NYAAALAAHH"}';
            add_header Content-Type application/json;
        }

        location / {
            proxy_pass http://frontend-service/;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
}